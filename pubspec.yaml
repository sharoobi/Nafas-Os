name: nafas_os
description: 'Nafas OS - local-first anti-smoking intervention system'
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.2.0
  fl_chart: ^1.1.1
  flutter_local_notifications: ^19.4.2
  flutter_riverpod: ^3.0.3
  geolocator: ^14.0.2
  go_router: ^16.2.1
  intl: ^0.20.2
  package_info_plus: ^9.0.0
  path: ^1.9.1
  permission_handler: ^12.0.1
  sensors_plus: ^7.0.0
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  tflite_flutter: ^0.11.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/models/
